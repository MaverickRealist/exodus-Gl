<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rational Trek: Global Roman Catholic Edition (A–Z)</title>

<style>
:root{
--a:#4a90e2;
--b:#ffffff;
--c:#f7f9fc;
--d:#222;
--e:#6fcf97;
}

body,html{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:var(--b);
color:var(--d);
font-family:Segoe UI, sans-serif;
}

#bg{
position:fixed;
width:100%;
height:100%;
background:url('hardtrek.jpg') center/cover no-repeat;
z-index:-2;
filter:brightness(1.05) contrast(0.9);
}

#ui{
height:100%;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.panel{
background:rgba(255,255,255,0.92);
padding:30px;
border-radius:12px;
max-width:820px;
box-shadow:0 10px 40px rgba(0,0,0,0.08);
backdrop-filter:blur(6px);
}

h1{
color:var(--a);
letter-spacing:1px;
}

p{
color:#444;
min-height:130px;
line-height:1.6;
}

.btn{
margin:10px;
padding:12px 25px;
border:1px solid var(--a);
background:#fff;
color:var(--a);
cursor:pointer;
border-radius:6px;
}

.btn:hover{
background:var(--a);
color:#fff;
}

#letter{
position:absolute;
top:10px;
right:20px;
font-size:4rem;
color:var(--a);
opacity:.12;
}

#img{
width:100%;
max-height:300px;
object-fit:cover;
margin-bottom:15px;
border-radius:8px;
}
</style>
</head>

<body>

<div id="bg"></div>
<div id="letter">A</div>

<div id="ui">
<div class="panel">
<img id="img" src="hardtrek.jpg">
<h1 id="title"></h1>
<p id="desc"></p>
<button class="btn" onclick="p()">◀</button>
<button class="btn" onclick="n()">▶</button>
</div>
</div>

<script>
const D=[
{l:"A",t:"Allegory vs Absolutism",d:"Global Catholic narratives are sometimes interpreted literally, creating tension between symbolic theology and rational inquiry."},
{l:"B",t:"Belief Conditioning",d:"Structured teaching systems shape perspectives early, influencing long-term autonomy."},
{l:"C",t:"Clergy-Laity Divide",d:"Hierarchies can impact access to influence and opportunity."},
{l:"D",t:"Dignity of Service",d:"Religious labor raises questions about fairness, autonomy, and recognition."},
{l:"E",t:"Ecclesiastical Power",d:"Centralized authority blends spiritual and institutional control."},
{l:"F",t:"Factional Influence",d:"Internal groups may shape decisions informally."},
{l:"G",t:"Governance Ethics",d:"Transparency and accountability are global concerns."},
{l:"H",t:"Hidden Wealth",d:"Financial opacity prompts calls for reform."},
{l:"I",t:"Institutional Resources",d:"Use of resources remains a subject of global debate."},
{l:"J",t:"Judgment vs Freedom",d:"Balancing doctrine and individual rights remains complex."},
{l:"K",t:"Knowledge Boundaries",d:"Control over teachings can influence intellectual exposure."},
{l:"L",t:"Leadership Structures",d:"Clerical dominance may limit broader participation."},
{l:"M",t:"Mission Strategies",d:"Methods sometimes favor conformity over questioning."},
{l:"N",t:"Norms vs Change",d:"Traditions often resist rapid evolution."},
{l:"O",t:"Organizational Politics",d:"Internal dynamics affect direction and governance."},
{l:"P",t:"Power Balance",d:"Concentration of authority requires oversight."},
{l:"Q",t:"Questioning Doctrine",d:"Critical voices often face resistance."},
{l:"R",t:"Rights & Doctrine",d:"Conflicts with modern civil liberties persist."},
{l:"S",t:"Sexual Ethics",d:"Teachings on gender and reproduction remain contested globally."},
{l:"T",t:"Tradition vs Reform",d:"Balancing continuity with change is ongoing."},
{l:"U",t:"Universalism",d:"Relations with other faiths vary widely."},
{l:"V",t:"Voice of the Faithful",d:"Participation from laity is increasingly demanded."},
{l:"W",t:"Wealth Distribution",d:"Equitable use of resources remains debated."},
{l:"X",t:"Exchange & Dialogue",d:"Interfaith engagement is uneven globally."},
{l:"Y",t:"Youth Autonomy",d:"Younger generations seek independent thought."},
{l:"Z",t:"Zenith Awareness",d:"An informed, questioning global community is emerging."}
];

let i=0;

function r(){
let s=D[i];
document.getElementById("letter").innerText=s.l;
document.getElementById("title").innerText=s.l+": "+s.t;
document.getElementById("desc").innerText=s.d;
if(i===D.length-1){
document.getElementById("img").src="bliss.jpg";
}
}

function n(){if(i<D.length-1){i++;r()}}
function p(){if(i>0){i--;r()}}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowRight")n();
if(e.key==="ArrowLeft")p();
let k=e.key.toUpperCase();
let idx=D.findIndex(x=>x.l===k);
if(idx!==-1){i=idx;r()}
});

r();
</script>

</body>
</html>
